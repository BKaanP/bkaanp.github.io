name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp -r apps/landing/dist/* dist/
          if [ -d "apps/image-search/dist" ]; then
            cp -r apps/image-search/dist dist/image-search
          fi
          if [ -d "apps/rag/dist" ]; then
            cp -r apps/rag/dist dist/rag
          fi
          if [ -d "apps/mcp-client/dist" ]; then
            cp -r apps/mcp-client/dist dist/mcp-client
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4